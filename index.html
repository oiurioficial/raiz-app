<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>RAIZ²</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#173F35">

<link rel="apple-touch-icon" href="https://i.ibb.co/hxtT2dpf/LOGORAIZ.jpg">

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: #F4F6F4;
}

iframe {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
}
</style>

</head>

<body>

<iframe 
src="https://www.sistemaraiz2.com.br/p/plataforma-raiz-v2.html?m=1">
</iframe>
<script>
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;

  // cria botão invisível (ou você pode estilizar depois)
  const btn = document.createElement('button');
  btn.innerText = "Instalar App";
  btn.style.position = "fixed";
  btn.style.bottom = "20px";
  btn.style.left = "50%";
  btn.style.transform = "translateX(-50%)";
  btn.style.padding = "12px 20px";
  btn.style.background = "#173F35";
  btn.style.color = "#fff";
  btn.style.border = "none";
  btn.style.borderRadius = "10px";
  btn.style.zIndex = "9999";

  document.body.appendChild(btn);

  btn.addEventListener('click', () => {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      btn.remove();
    });
  });
});
</script>
</body>

</html>
